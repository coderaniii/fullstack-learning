<head>

    <title>CSS Media Queries</title>
    <style>
        body{
            background-color: red;
        }
        @media only screen and (min-width:455px){
            body{
                background-color: green;
            }
        }
        .boxes{
            display:flex;
            flex-direction: column;
        }
        .box{
            widtg:344px;
            height: 344px;
            background-color:  rgb(92, 92, 148);
            padding: 3px;
            margin:3px;
        }
    </style>
</head>
<body>
    <div>
        I am a red body guy!
    </div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
</body>
</html>
