<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Display Property</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .box {
            border: 2px solid blue;
            display: inline-block;
            padding: 45px;
            margin: 35px;
            width: 319px;
        }
        .box1{
            display: none;
            visibility: hidden;
        }
    </style>
</head>

<body>
    <div class="box" also a nice box>
        I am a box.
    </div>
    <div>I am also a nice box.</div>
    <span>I am a good</span>
    <span>girl</span>
</body>

</html>
