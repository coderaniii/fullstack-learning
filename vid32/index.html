<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise:CSS card design</title>
    <style>
        body {
            background-color: gray;
        }
        *{
            margin: 0;
            padding: 0;
        }
        .card {
            background-color: white;
            width: 210px;
            height: 360px;
            border-radius: 7px;
            padding: 0px 0px 34px 0px;
        }

        .image {
            padding: 5px;
            border-radius: 7px;
        }
        .image img{
            border-radius: 7px;
        }
        .content{
            padding:7px 13px;
        }
        .content p{
            font-size: 9px;
            color: gray;

        }
        .capsules{
            padding:0 28px 0 14px;
        }
        .capsules span{
            border: 1px solid gray;
            padding: 0px 6px;
            border-radius: 11px;
            font-size: 6px;
            font-family: 'Baloo Bhai 2',sans-serif;
        }
        .button{
            text-align: center;
        }
        .button button{
            text-align: center;
            padding: 7px 9px;
            border-radius: 15px;
            background-color: rgb(117, 117, 205);
            color: rgb(46, 46, 142);
            font-size: 10px;
            margin-top: 7px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        .button button:hover{
            background-color: rgb(46, 46, 142);
            color: white;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="image">
            <img width=188
                src="https://static.vecteezy.com/system/resources/thumbnails/052/248/075/small/peacock-feather-wallpaper-hd-wallpaper-photo.jpeg">
        </div>
        <div class="capsules">
            <span>Nature</span>
            <span>Lake</span>
        </div>
        <div class="content"></div>
        <h2>Aniiii</h2>
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Possimus quasi in facere optio itaque aliquam
            blanditiis ab? Illum cum architecto qui beatae animi?</p>
        <div class="button">
            <button>Submit</button>
            </div>
</body>

</html>
